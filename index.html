<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digitale - Palazzo Fiorini</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d35400;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        header {
            text-align: center;
            padding: 15px 0 10px 0;
        }

        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        /* --- NAVIGAZIONE A PULSANTI CATEGORIE --- */
        .categories-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 15px;
            scrollbar-width: none; /* Firefox */
        }
        .categories-container::-webkit-scrollbar {
            display: none; /* Chrome / Safari */
        }

        .cat-btn {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cat-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(211, 84, 0, 0.4);
        }

        /* --- GRIGLIA / LISTA PIATTI --- */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .piatto-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: row;
        }

        .piatto-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            background-color: #eee;
            flex-shrink: 0;
        }

        .piatto-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .piatto-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .piatto-nome {
            font-weight: bold;
            font-size: 1.05rem;
            margin: 0;
            color: var(--primary-color);
        }

        .piatto-prezzo {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.05rem;
            white-space: nowrap;
        }

        .piatto-allergeni {
            font-size: 0.75rem;
            color: #777;
            margin-top: 6px;
            font-style: italic;
        }

        .empty-msg {
            text-align: center;
            color: #777;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Palazzo Fiorini</h1>
        <p style="margin: 5px 0 0 0; color: #666; font-size: 0.9rem;">Menu Digitale</p>
    </header>

    <!-- Barra dei pulsanti Categorie -->
    <div class="categories-container" id="category-buttons">
        <button class="cat-btn active" onclick="filterCategory('Tutti', this)">Tutti</button>
    </div>

    <!-- Contenitore Lista Piatti -->
    <div class="menu-list" id="menu-container">
        <p class="empty-msg">Caricamento menu in corso...</p>
    </div>

    <script>
        let tuttiIPiatti = [];

        // Carica i dati dal file menu.json salvato da Streamlit
        async function loadMenu() {
            try {
                const response = await fetch('menu.json?v=' + new Date().getTime());
                if (!response.ok) throw new Error('Impossibile caricare menu.json');
                
                tuttiIPiatti = await response.json();
                
                generaPulsantiCategorie();
                renderMenu(tuttiIPiatti);
            } catch (error) {
                console.error(error);
                document.getElementById('menu-container').innerHTML = 
                    '<p class="empty-msg">Menu in aggiornamento o nessun piatto presente.</p>';
            }
        }

        // Genera i pulsanti delle categorie in modo dinamico
        function generaPulsantiCategorie() {
            const container = document.getElementById('category-buttons');
            
            // Estrae tutte le categorie uniche
            const categorie = [...new Set(tuttiIPiatti.map(p => p.categoria || 'Altro'))];

            let htmlButtons = `<button class="cat-btn active" onclick="filterCategory('Tutti', this)">Tutti</button>`;
            
            categorie.forEach(cat => {
                htmlButtons += `<button class="cat-btn" onclick="filterCategory('${cat.replace(/'/g, "\\'")}', this)">${cat}</button>`;
            });

            container.innerHTML = htmlButtons;
        }

        // Filtra i piatti in base alla categoria cliccata
        function filterCategory(categoria, btnElement) {
            // Aggiorna lo stato dei pulsanti (colore attivo)
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            if (categoria === 'Tutti') {
                renderMenu(tuttiIPiatti);
            } else {
                const filtrati = tuttiIPiatti.filter(p => p.categoria === categoria);
                renderMenu(filtrati);
            }
        }

        // Mostra a schermo le schede dei piatti
        function renderMenu(piatti) {
            const container = document.getElementById('menu-container');
            
            if (piatti.length === 0) {
                container.innerHTML = '<p class="empty-msg">Nessun piatto disponibile in questa categoria.</p>';
                return;
            }

            let html = '';
            piatti.forEach(p => {
                // Se c'è l'immagine in Base64 usa quella, altrimenti usa un placeholder neutro
                const imgSrc = p.immagine && p.immagine.trim() !== '' 
                    ? p.immagine 
                    : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="%23ccc"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.55 3.89 3.5 4.16V22h2.99v-8.84C11.45 12.89 13 11.12 13 9V2h-2v7zm8-7h-2v20h2V12h2V2h-2z"/></svg>';

                const allergeniText = p.allergeni ? `Allergeni: ${p.allergeni}` : '';

                html += `
                    <div class="piatto-card">
                        <img src="${imgSrc}" class="piatto-img" alt="${p.nome}">
                        <div class="piatto-info">
                            <div class="piatto-header">
                                <h3 class="piatto-nome">${p.nome}</h3>
                                <span class="piatto-prezzo">€ ${parseFloat(p.prezzo).toFixed(2)}</span>
                            </div>
                            ${allergeniText ? `<div class="piatto-allergeni">${allergeniText}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Avvia il caricamento
        loadMenu();
    </script>
</body>
</html>
